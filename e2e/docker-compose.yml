# ADMapper E2E Test Environment
#
# Uses official database images for integration testing.
#
# Usage:
#   docker compose -f e2e/docker-compose.yml up -d neo4j falkordb
#   docker compose -f e2e/docker-compose.yml run --rm tests ./e2e/run-tests.sh <data.zip>
#   docker compose -f e2e/docker-compose.yml down

services:
  # Neo4j database for Cypher tests
  neo4j:
    image: docker.io/neo4j:5.18.1-community
    environment:
      NEO4J_AUTH: neo4j/neo4j123
      NEO4J_PLUGINS: '[]'
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      NEO4J_server_http_listen__address: 0.0.0.0:7474
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 5s
      timeout: 5s
      retries: 12

  # FalkorDB (Redis + graph module) for Cypher tests
  falkordb:
    image: docker.io/falkordb/falkordb:v4.2.1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Test runner container
  tests:
    build:
      context: ..
      dockerfile: e2e/Dockerfile
    volumes:
      - ..:/workspace:ro
      - ../target:/workspace/target:ro
    working_dir: /workspace
    depends_on:
      neo4j:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    environment:
      NEO4J_HOST: neo4j
      NEO4J_PORT: 7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j123
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
