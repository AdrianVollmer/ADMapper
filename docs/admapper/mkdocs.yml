site_name: ADMapper
site_description: Interactive graph visualization for Active Directory security analysis
site_url: https://adrianvollmer.github.io/ADMapper

repo_name: ADMapper
repo_url: https://github.com/AdrianVollmer/ADMapper

theme:
  name: material
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AdrianVollmer/ADMapper

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - smarty
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - Importing Data: guide/importing.md
    - Graph Navigation: guide/navigation.md
    - Running Queries: guide/queries.md
    - Security Insights: guide/insights.md
  - API Reference:
    - Overview: api/index.md
    - Database: api/database.md
    - Import: api/import.md
    - Graph: api/graph.md
    - Query: api/query.md
    - Cache: api/cache.md
    - Settings: api/settings.md
    - Query History: api/history.md
  - Database Backends: backends.md
  - CLI Reference: cli.md
