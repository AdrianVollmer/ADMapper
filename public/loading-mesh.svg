<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid edges - horizontal -->
  <line x1="4" y1="4" x2="12" y2="4" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="12" y1="4" x2="20" y2="4" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="4" y1="12" x2="12" y2="12" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="12" y1="12" x2="20" y2="12" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="4" y1="20" x2="12" y2="20" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="12" y1="20" x2="20" y2="20" stroke="#1e1b4b" stroke-width="0.5"></line>
  <!-- Grid edges - vertical -->
  <line x1="4" y1="4" x2="4" y2="12" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="4" y1="12" x2="4" y2="20" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="12" y1="4" x2="12" y2="12" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="12" y1="12" x2="12" y2="20" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="20" y1="4" x2="20" y2="12" stroke="#1e1b4b" stroke-width="0.5"></line>
  <line x1="20" y1="12" x2="20" y2="20" stroke="#1e1b4b" stroke-width="0.5"></line>
  <!-- Nodes pulsing in wave pattern -->
  <circle cx="4" cy="4" r="1.5" fill="#818cf8" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="12" cy="4" r="1.5" fill="#818cf8" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.2s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="20" cy="4" r="1.5" fill="#818cf8" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.4s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="4" cy="12" r="1.5" fill="#a855f7" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.2s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="12" cy="12" r="1.5" fill="#a855f7" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.4s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="20" cy="12" r="1.5" fill="#a855f7" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.6s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="4" cy="20" r="1.5" fill="#c084fc" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.4s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="12" cy="20" r="1.5" fill="#c084fc" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.6s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="20" cy="20" r="1.5" fill="#c084fc" opacity="0.2">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.8s" repeatCount="indefinite"></animate>
