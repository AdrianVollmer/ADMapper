name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "Commits since $PREV_TAG:"
            NOTES=$(git log --pretty=format:"- %s" $PREV_TAG..HEAD | head -50)
          else
            echo "Initial release"
            NOTES="Initial release"
          fi
          # Write to file for multi-line support
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ADMapper v${{ steps.version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-bin

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: bash scripts/generate-icons.sh

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload DEB
        uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/release/bundle/deb/ADMapper_${{ needs.create-release.outputs.version }}_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload RPM
        uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/release/bundle/rpm/ADMapper-${{ needs.create-release.outputs.version }}-1.x86_64.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/release/bundle/appimage/ADMapper_${{ needs.create-release.outputs.version }}_amd64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary
        run: |
          cp src/backend/target/release/admapper src/backend/target/release/admapper-linux-amd64
      - uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/release/admapper-linux-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ImageMagick
        run: choco install imagemagick -y

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        shell: bash
        run: bash scripts/generate-icons.sh

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload MSI
        uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/release/bundle/msi/ADMapper_${{ needs.create-release.outputs.version }}_x64_en-US.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS
        uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/release/bundle/nsis/ADMapper_${{ needs.create-release.outputs.version }}_x64-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary
        run: |
          copy src\backend\target\release\admapper.exe src\backend\target\release\admapper-windows-amd64.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/release/admapper-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install librsvg
        run: brew install librsvg

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons
        run: bash scripts/generate-icons.sh

      - name: Build Tauri app (Universal)
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/universal-apple-darwin/release/bundle/dmg/ADMapper_${{ needs.create-release.outputs.version }}_universal.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binary
        run: |
          cp src/backend/target/universal-apple-darwin/release/admapper src/backend/target/universal-apple-darwin/release/admapper-macos-universal
      - uses: softprops/action-gh-release@v2
        with:
          files: src/backend/target/universal-apple-darwin/release/admapper-macos-universal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
