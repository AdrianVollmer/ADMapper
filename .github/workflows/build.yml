name: Build

on:
  pull_request:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/backend
            src/crustdb
            src/crustdb-cli
          cache-on-failure: true

      - name: Create empty build dir for rust-embed
        run: mkdir -p build

      - name: Build backend (headless)
        run: cargo build --manifest-path src/backend/Cargo.toml --no-default-features --features crustdb,neo4j,falkordb --release

      - name: Build crustdb
        run: cargo build --manifest-path src/crustdb/Cargo.toml --release

      - name: Build crustdb-cli
        run: cargo build --manifest-path src/crustdb-cli/Cargo.toml --release

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-linux
          path: src/backend/target/release/admapper
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: build/
          retention-days: 1
