<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADMapper Graph Export</title>
    <link id="favicon" rel="icon" type="image/svg+xml" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        background: #111827;
        color: #e5e7eb;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        overflow: hidden;
      }

      #layout {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* ── Top bar ─────────────────────────────────────────────── */
      #topbar {
        flex: none;
        height: 38px;
        background: #1f2937;
        border-bottom: 1px solid #374151;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        user-select: none;
      }

      .logo-link {
        display: flex;
        align-items: center;
        gap: 7px;
        text-decoration: none;
        color: #818cf8;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        flex: none;
      }

      .logo-link:hover {
        color: #a5b4fc;
      }

      .logo-svg {
        width: 20px;
        height: 20px;
        flex: none;
      }

      .sep {
        width: 1px;
        height: 18px;
        background: #374151;
        flex: none;
      }

      #stats {
        font-size: 12px;
        color: #9ca3af;
      }

      #export-date {
        font-size: 11px;
        color: #6b7280;
        margin-left: auto;
      }

      .toolbar-btn {
        background: #374151;
        border: 1px solid #4b5563;
        color: #d1d5db;
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }

      .toolbar-btn:hover {
        background: #4b5563;
      }

      /* ── Main area ───────────────────────────────────────────── */
      #main {
        flex: 1;
        display: flex;
        min-height: 0;
        position: relative;
      }

      #cy {
        flex: 1;
        min-width: 0;
      }

      /* ── Detail panel ────────────────────────────────────────── */
      #panel {
        width: 280px;
        flex: none;
        background: #1f2937;
        border-left: 1px solid #374151;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transform: translateX(100%);
        transition: transform 0.2s ease;
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
      }

      #panel.open {
        transform: translateX(0);
        position: relative;
      }

      #panel-header {
        flex: none;
        padding: 12px 14px 10px;
        border-bottom: 1px solid #374151;
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      #panel-header-text {
        flex: 1;
        min-width: 0;
      }

      #panel-name {
        font-size: 13px;
        font-weight: 600;
        word-break: break-all;
        line-height: 1.4;
      }

      #panel-type {
        font-size: 11px;
        margin-top: 2px;
        font-weight: 500;
      }

      #panel-close {
        flex: none;
        background: none;
        border: none;
        color: #6b7280;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        padding: 2px;
        border-radius: 3px;
        transition: color 0.15s;
      }

      #panel-close:hover {
        color: #d1d5db;
      }

      #panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 10px 14px;
      }

      #panel-section-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6b7280;
        margin-bottom: 6px;
      }

      .prop-row {
        display: flex;
        gap: 8px;
        padding: 5px 0;
        border-bottom: 1px solid #1f2937;
        font-size: 12px;
        align-items: baseline;
      }

      .prop-row:first-child {
        border-top: 1px solid #374151;
      }

      .prop-key {
        color: #9ca3af;
        min-width: 90px;
        max-width: 90px;
        font-family: monospace;
        word-break: break-all;
        font-size: 11px;
      }

      .prop-val {
        color: #d1d5db;
        word-break: break-all;
        flex: 1;
      }

      .prop-val.bool-true {
        color: #34d399;
      }

      .prop-val.bool-false {
        color: #f87171;
      }

      .empty-props {
        font-size: 12px;
        color: #4b5563;
        font-style: italic;
      }

      /* ── Scrollbar styling ───────────────────────────────────── */
      #panel-body::-webkit-scrollbar {
        width: 5px;
      }

      #panel-body::-webkit-scrollbar-track {
        background: #1f2937;
      }

      #panel-body::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 3px;
      }

      /* ── Zoom hint ───────────────────────────────────────────── */
      #hint {
        position: absolute;
        bottom: 10px;
        left: 12px;
        font-size: 11px;
        color: #4b5563;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <div id="topbar">
        <a class="logo-link" href="https://adrianvollmer.github.io/ADMapper/" target="_blank" rel="noopener noreferrer">
          <svg class="logo-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <line x1="4" y1="4" x2="12" y2="4" stroke="#6366f1" stroke-width="0.5" />
            <line x1="12" y1="4" x2="20" y2="4" stroke="#6366f1" stroke-width="0.5" />
            <line x1="4" y1="12" x2="12" y2="12" stroke="#6366f1" stroke-width="0.5" />
            <line x1="12" y1="12" x2="20" y2="12" stroke="#6366f1" stroke-width="0.5" />
            <line x1="4" y1="20" x2="12" y2="20" stroke="#6366f1" stroke-width="0.5" />
            <line x1="12" y1="20" x2="20" y2="20" stroke="#6366f1" stroke-width="0.5" />
            <line x1="4" y1="4" x2="4" y2="12" stroke="#6366f1" stroke-width="0.5" />
            <line x1="4" y1="12" x2="4" y2="20" stroke="#6366f1" stroke-width="0.5" />
            <line x1="12" y1="4" x2="12" y2="12" stroke="#6366f1" stroke-width="0.5" />
            <line x1="12" y1="12" x2="12" y2="20" stroke="#6366f1" stroke-width="0.5" />
            <line x1="20" y1="4" x2="20" y2="12" stroke="#6366f1" stroke-width="0.5" />
            <line x1="20" y1="12" x2="20" y2="20" stroke="#6366f1" stroke-width="0.5" />
            <circle cx="4" cy="4" r="1.5" fill="#818cf8" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0s" repeatCount="indefinite" />
            </circle>
            <circle cx="12" cy="4" r="1.5" fill="#818cf8" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.2s" repeatCount="indefinite" />
            </circle>
            <circle cx="20" cy="4" r="1.5" fill="#818cf8" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.4s" repeatCount="indefinite" />
            </circle>
            <circle cx="4" cy="12" r="1.5" fill="#a78bfa" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.2s" repeatCount="indefinite" />
            </circle>
            <circle cx="12" cy="12" r="1.5" fill="#a78bfa" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.4s" repeatCount="indefinite" />
            </circle>
            <circle cx="20" cy="12" r="1.5" fill="#a78bfa" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.6s" repeatCount="indefinite" />
            </circle>
            <circle cx="4" cy="20" r="1.5" fill="#c4b5fd" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.4s" repeatCount="indefinite" />
            </circle>
            <circle cx="12" cy="20" r="1.5" fill="#c4b5fd" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.6s" repeatCount="indefinite" />
            </circle>
            <circle cx="20" cy="20" r="1.5" fill="#c4b5fd" opacity="0.3">
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" begin="0.8s" repeatCount="indefinite" />
            </circle>
          </svg>
          ADMapper
        </a>
        <div class="sep"></div>
        <span id="stats"></span>
        <div class="sep"></div>
        <button class="toolbar-btn" id="fit-btn">Fit Graph</button>
        <button class="toolbar-btn" id="labels-btn">Toggle Labels</button>
        <span id="export-date"></span>
      </div>

      <div id="main">
        <div id="cy"></div>

        <div id="panel">
          <div id="panel-header">
            <div id="panel-header-text">
              <div id="panel-name"></div>
              <div id="panel-type"></div>
            </div>
            <button id="panel-close" title="Close">✕</button>
          </div>
          <div id="panel-body">
            <div id="panel-section-title">Properties</div>
            <div id="panel-props"></div>
          </div>
        </div>
      </div>

      <div id="hint">Scroll to zoom · Click node for details · Drag to pan</div>
    </div>

    <!-- Graph data injected at export time -->
    <script id="graph-data" type="application/json">
      __GRAPH_DATA_PLACEHOLDER__
    </script>

    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>

    <script>
      "use strict";

      // ── Favicon from inline logo SVG ─────────────────────────────
      (() => {
        const svg = document.querySelector(".logo-svg");
        const clone = svg.cloneNode(true);
        clone.removeAttribute("class");
        document.getElementById("favicon").href =
          "data:image/svg+xml," + encodeURIComponent(new XMLSerializer().serializeToString(clone));
      })();

      // ── Data ────────────────────────────────────────────────────
      const DATA = JSON.parse(document.getElementById("graph-data").textContent);

      // ── Node type → color mapping (mirrors ADMapper theme.ts) ──
      const NODE_COLORS = {
        User: "#22b8cf",
        Group: "#fab005",
        Computer: "#f03e3e",
        Domain: "#7950f2",
        GPO: "#fd7e14",
        OU: "#20c997",
        Container: "#db2777",
        CertTemplate: "#f06595",
        EnterpriseCA: "#f06595",
        RootCA: "#f06595",
        AIACA: "#f06595",
        NTAuthStore: "#f06595",
        Unknown: "#adb5bd",
      };

      function nodeColor(type) {
        return NODE_COLORS[type] || NODE_COLORS["Unknown"];
      }

      // ── Build Cytoscape elements ─────────────────────────────────
      // Sigma/graphology uses y-up; Cytoscape/SVG uses y-down → negate y.
      const elements = [
        ...DATA.nodes.map((n) => ({
          data: {
            id: n.id,
            label: n.label,
            type: n.type,
            properties: n.properties || {},
          },
          position: { x: n.x, y: -n.y },
        })),
        ...DATA.edges.map((e) => ({
          data: {
            id: e.id || e.source + "->" + e.target + ":" + e.type,
            source: e.source,
            target: e.target,
            label: e.type,
          },
        })),
      ];

      // ── Cytoscape init ───────────────────────────────────────────
      const cy = cytoscape({
        container: document.getElementById("cy"),
        elements,
        style: [
          {
            selector: "node",
            style: {
              width: 26,
              height: 26,
              "background-color": (n) => nodeColor(n.data("type")),
              label: "data(label)",
              "font-size": "10px",
              "text-valign": "bottom",
              "text-halign": "center",
              "text-margin-y": 4,
              color: "#c9d1d9",
              "text-background-color": "#111827",
              "text-background-opacity": 0.75,
              "text-background-padding": "2px",
              "text-background-shape": "roundrectangle",
              "border-width": 0,
              "min-zoomed-font-size": 5,
            },
          },
          {
            selector: "node:selected",
            style: {
              "border-width": 2.5,
              "border-color": "#fff700",
              "background-color": (n) => nodeColor(n.data("type")),
            },
          },
          {
            selector: "edge",
            style: {
              width: 1.5,
              "line-color": "#4b5563",
              "target-arrow-color": "#4b5563",
              "target-arrow-shape": "triangle",
              "arrow-scale": 0.8,
              "curve-style": "bezier",
              label: "data(label)",
              "font-size": "9px",
              color: "#6b7280",
              "text-rotation": "autorotate",
              "text-background-color": "#111827",
              "text-background-opacity": 0.75,
              "text-background-padding": "2px",
              "min-zoomed-font-size": 7,
            },
          },
          {
            selector: "edge:selected",
            style: {
              "line-color": "#fff700",
              "target-arrow-color": "#fff700",
              color: "#fff700",
            },
          },
          {
            selector: ".dimmed",
            style: {
              opacity: 0.15,
            },
          },
          {
            selector: "node.highlighted",
            style: {
              opacity: 1,
              "border-width": 2,
              "border-color": "#818cf8",
            },
          },
          {
            selector: "edge.highlighted",
            style: {
              opacity: 1,
              "line-color": "#818cf8",
              "target-arrow-color": "#818cf8",
            },
          },
        ],
        layout: { name: "preset" },
        wheelSensitivity: 0.3,
        minZoom: 0.05,
        maxZoom: 10,
      });

      cy.fit(undefined, 60);

      // ── Top bar info ─────────────────────────────────────────────
      document.getElementById("stats").textContent = DATA.nodes.length + " nodes · " + DATA.edges.length + " edges";
      document.getElementById("export-date").textContent = "Exported " + new Date(DATA.exportedAt).toLocaleString();

      // ── Toolbar buttons ──────────────────────────────────────────
      document.getElementById("fit-btn").addEventListener("click", () => cy.fit(undefined, 60));

      let labelsVisible = true;
      document.getElementById("labels-btn").addEventListener("click", () => {
        labelsVisible = !labelsVisible;
        cy.style()
          .selector("node")
          .style("label", labelsVisible ? "data(label)" : "")
          .update();
        cy.style()
          .selector("edge")
          .style("label", labelsVisible ? "data(label)" : "")
          .update();
      });

      // ── Detail panel ─────────────────────────────────────────────
      const panel = document.getElementById("panel");
      const panelName = document.getElementById("panel-name");
      const panelType = document.getElementById("panel-type");
      const panelProps = document.getElementById("panel-props");

      function openPanel(node) {
        const d = node.data();

        panelName.textContent = d.label;
        panelType.textContent = d.type;
        panelType.style.color = nodeColor(d.type);

        const props = d.properties || {};
        const keys = Object.keys(props).sort();

        if (keys.length === 0) {
          panelProps.innerHTML = '<div class="empty-props">No properties available</div>';
        } else {
          panelProps.innerHTML = keys
            .map((k) => {
              const raw = props[k];
              const val = raw === null ? "null" : raw === undefined ? "" : String(raw);
              let cls = "prop-val";
              if (raw === true) cls += " bool-true";
              else if (raw === false) cls += " bool-false";
              return (
                '<div class="prop-row">' +
                '<span class="prop-key">' +
                esc(k) +
                "</span>" +
                '<span class="' +
                cls +
                '">' +
                esc(val) +
                "</span>" +
                "</div>"
              );
            })
            .join("");
        }

        panel.classList.add("open");

        // Dim unrelated nodes/edges, highlight neighbourhood
        cy.elements().addClass("dimmed").removeClass("highlighted");
        node.removeClass("dimmed").addClass("highlighted");
        node.connectedEdges().removeClass("dimmed").addClass("highlighted");
        node.neighborhood("node").removeClass("dimmed").addClass("highlighted");
      }

      function closePanel() {
        panel.classList.remove("open");
        cy.elements().removeClass("dimmed").removeClass("highlighted");
      }

      cy.on("tap", "node", (evt) => openPanel(evt.target));
      cy.on("tap", (evt) => {
        if (evt.target === cy) closePanel();
      });
      document.getElementById("panel-close").addEventListener("click", closePanel);

      // ── HTML-escape helper ────────────────────────────────────────
      function esc(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
