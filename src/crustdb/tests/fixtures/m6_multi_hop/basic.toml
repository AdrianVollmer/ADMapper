# M6: Multi-Hop Traversal
# Test cases for variable-length path queries

[[test]]
name = "variable_length_1_to_2"
description = "Match paths of length 1 to 2"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS" },
    { from = "b", to = "c", type = "KNOWS" },
]

[test.query]
cypher = """
MATCH (a:Person {name: 'Alice'})-[:KNOWS*1..2]->(b:Person)
RETURN b.name
"""

[test.expected]
columns = ["b.name"]
rows = [
    ["Bob"],
    ["Charlie"],
]


[[test]]
