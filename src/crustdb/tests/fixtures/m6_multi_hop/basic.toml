[[test]]
name = "path_variable"
description = "Bind entire path to variable"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS" },
    { from = "b", to = "c", type = "KNOWS" },
]

[test.query]
cypher = """
MATCH p = (a:Person {name: 'Alice'})-[:KNOWS*]->(c:Person {name: 'Charlie'})
RETURN p
"""

[test.expected]
columns = ["p"]
row_count = 1


[[test]]
name = "cycle_detection"
description = "Handle cycles in graph"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS" },
    { from = "b", to = "c", type = "KNOWS" },
    { from = "c", to = "a", type = "KNOWS" },
]

[test.query]
cypher = """
MATCH (a:Person {name: 'Alice'})-[:KNOWS*1..3]->(b:Person)
WHERE a <> b
RETURN DISTINCT b.name
"""

[test.expected]
columns = ["b.name"]
rows = [
    ["Bob"],
    ["Charlie"],
]


[[test]]
name = "undirected_multi_hop"
description = "Variable-length undirected traversal"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS" },
    { from = "c", to = "b", type = "KNOWS" },
]

[test.query]
cypher = """
MATCH (a:Person {name: 'Alice'})-[:KNOWS*1..2]-(c:Person)
WHERE a <> c
RETURN DISTINCT c.name
"""

[test.expected]
columns = ["c.name"]
rows = [
    ["Bob"],
    ["Charlie"],
]


[[test]]
name = "multi_hop_with_properties"
description = "Access relationship list from variable-length pattern"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS", properties = { since = 2015 } },
    { from = "b", to = "c", type = "KNOWS", properties = { since = 2020 } },
]

[test.query]
cypher = """
MATCH (a:Person {name: 'Alice'})-[rels:KNOWS*2]->(c:Person)
RETURN c.name, rels
"""

[test.expected]
columns = ["c.name", "rels"]
row_count = 1
