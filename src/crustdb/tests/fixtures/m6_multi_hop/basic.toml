[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})-[:KNOWS]->(c:Person {name: 'Charlie'})-[:WORKS_WITH]->(d:Person {name: 'Diana'})"]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS*]->(x:Person) RETURN x.name"
