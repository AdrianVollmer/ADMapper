# M6: Multi-Hop Traversal
# Test cases for variable-length path queries

[[test]]
name = "variable_length_1_to_2"
description = "Match paths of length 1 to 2"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})-[:KNOWS]->(c:Person {name: 'Charlie'})"]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS*1..2]->(b:Person) RETURN b.name"
[test.expected]
columns = ["b.name"]
row_count = 2


[[test]]
name = "variable_length_exact"
description = "Match paths of exact length"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})-[:KNOWS]->(c:Person {name: 'Charlie'})"]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS*2]->(c:Person) RETURN c.name"
[test.expected]
columns = ["c.name"]
row_count = 1


[[test]]
name = "variable_length_unbounded"
description = "Match paths of any length"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})-[:KNOWS]->(c:Person {name: 'Charlie'})-[:KNOWS]->(d:Person {name: 'Diana'})"]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS*]->(x:Person) RETURN x.name"
[test.expected]
columns = ["x.name"]
row_count = 3


[[test]]
name = "variable_length_any_type"
description = "Match any relationship type with variable length"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})-[:WORKS_WITH]->(c:Person {name: 'Charlie'})"]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[*1..2]->(x:Person) RETURN x.name"
[test.expected]
columns = ["x.name"]
row_count = 2


[[test]]
