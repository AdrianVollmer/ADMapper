[[test]]
name = "variable_length_no_matches"
description = "No matches when path doesn't exist"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'}), (b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS*]->(b:Person) RETURN b.name"
[test.expected]
columns = ["b.name"]
row_count = 0


