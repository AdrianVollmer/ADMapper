# M5: Single-Hop Traversal Tests
#
# Tests for navigating one relationship step.

[[test]]
name = "outgoing_relationship"
description = "Match outgoing relationship"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (a:Person)-[:KNOWS]->(b:Person) RETURN a.name, b.name"
[test.expected]
row_count = 1
columns = ["a.name", "b.name"]

[[test]]
name = "incoming_relationship"
description = "Match incoming relationship"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (b:Person {name: 'Bob'})<-[:KNOWS]-(a:Person) RETURN a.name"
[test.expected]
row_count = 1
columns = ["a.name"]

[[test]]
name = "undirected_relationship"
description = "Match relationship in any direction"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})",
    "CREATE (b:Person {name: 'Bob'})-[:KNOWS]->(c:Person {name: 'Charlie'})",
]
[test.query]
cypher = "MATCH (b:Person {name: 'Bob'})-[:KNOWS]-(other:Person) RETURN other.name"
[test.expected]
row_count = 2
columns = ["other.name"]

[[test]]
name = "any_relationship_type"
description = "Match any relationship type"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})",
    "CREATE (a:Person {name: 'Alice'})-[:WORKS_WITH]->(c:Person {name: 'Charlie'})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[]->(b:Person) RETURN b.name"
[test.expected]
row_count = 2
columns = ["b.name"]

[[test]]
name = "filter_by_relationship_type"
description = "Filter by specific relationship type"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})",
    "CREATE (a:Person {name: 'Alice'})-[:WORKS_WITH]->(c:Person {name: 'Charlie'})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person) RETURN b.name"
[test.expected]
row_count = 1
columns = ["b.name"]

[[test]]
name = "no_matching_relationships"
description = "No matches when relationship doesn't exist"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})",
    "CREATE (b:Person {name: 'Bob'})",
]
[test.query]
cypher = "MATCH (a:Person)-[:KNOWS]->(b:Person) RETURN a, b"
[test.expected]
row_count = 0
columns = ["a", "b"]

[[test]]
name = "with_where_clause"
description = "Filter results with WHERE"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob', age: 25})",
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(c:Person {name: 'Charlie', age: 35})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person) WHERE b.age > 30 RETURN b.name"
[test.expected]
row_count = 1
columns = ["b.name"]

[[test]]
name = "return_relationship_variable"
description = "Return the relationship itself"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS {since: 2020}]->(b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (a:Person)-[r:KNOWS]->(b:Person) RETURN a.name, r, b.name"
[test.expected]
row_count = 1
columns = ["a.name", "r", "b.name"]

[[test]]
name = "multiple_matches"
description = "Multiple relationship matches"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})",
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(c:Person {name: 'Charlie'})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person) RETURN b.name"
[test.expected]
row_count = 2
columns = ["b.name"]

[[test]]
name = "return_both_nodes"
description = "Return source and target nodes"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (a:Person)-[:KNOWS]->(b:Person) RETURN a, b"
[test.expected]
row_count = 1
columns = ["a", "b"]

[[test]]
name = "multiple_relationship_types"
description = "Match multiple relationship types with |"
[test.setup]
cypher = [
    "CREATE (m:Movie {title: 'Wall Street'})<-[:ACTED_IN]-(c:Person {name: 'Charlie Sheen'})",
    "CREATE (m:Movie {title: 'Wall Street'})<-[:DIRECTED]-(o:Person {name: 'Oliver Stone'})",
    "CREATE (m:Movie {title: 'Wall Street'})<-[:PRODUCED]-(p:Person {name: 'Ed Pressman'})",
]
[test.query]
cypher = "MATCH (:Movie {title: 'Wall Street'})<-[:ACTED_IN|DIRECTED]-(person:Person) RETURN person.name"
[test.expected]
row_count = 2
columns = ["person.name"]

[[test]]
name = "multiple_types_outgoing"
description = "Match multiple outgoing relationship types"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})",
    "CREATE (a:Person {name: 'Alice'})-[:WORKS_WITH]->(c:Person {name: 'Charlie'})",
    "CREATE (a:Person {name: 'Alice'})-[:LIVES_WITH]->(d:Person {name: 'Dave'})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS|WORKS_WITH]->(b:Person) RETURN b.name"
[test.expected]
row_count = 2
columns = ["b.name"]

[[test]]
name = "multiple_types_undirected"
description = "Match multiple relationship types in any direction"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})",
    "CREATE (c:Person {name: 'Charlie'})-[:WORKS_WITH]->(a:Person {name: 'Alice'})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS|WORKS_WITH]-(other:Person) RETURN other.name"
[test.expected]
row_count = 2
columns = ["other.name"]


[[test]]
name = "where_on_relationship"
description = "Filter by relationship property in WHERE clause"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS {since: 2010}]->(b:Person {name: 'Bob'})",
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS {since: 2000}]->(c:Person {name: 'Charlie'})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[r:KNOWS]->(b:Person) WHERE r.since > 2005 RETURN b.name"
[test.expected]
row_count = 1
columns = ["b.name"]


[[test]]
name = "where_on_relationship_multiple_conditions"
description = "Filter by relationship and node properties"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS {since: 2010, close: true}]->(b:Person {name: 'Bob', age: 30})",
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS {since: 2015, close: false}]->(c:Person {name: 'Charlie', age: 25})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[r:KNOWS]->(b:Person) WHERE r.since > 2005 AND b.age > 28 RETURN b.name"
[test.expected]
row_count = 1
columns = ["b.name"]
