# M5: Single-Hop Traversal
# Test cases for navigating one relationship step

[[test]]
name = "outgoing_edge"
description = "Match outgoing relationship"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS" },
]

[test.query]
cypher = """
MATCH (a:Person)-[:KNOWS]->(b:Person)
RETURN a.name, b.name
"""

[test.expected]
columns = ["a.name", "b.name"]
rows = [
    ["Alice", "Bob"],
]


[[test]]
name = "incoming_edge"
description = "Match incoming relationship"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS" },
]

[test.query]
cypher = """
MATCH (b:Person)<-[:KNOWS]-(a:Person)
RETURN a.name, b.name
"""

[test.expected]
columns = ["a.name", "b.name"]
rows = [
    ["Alice", "Bob"],
]


[[test]]
name = "undirected_edge"
description = "Match relationship in either direction"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS" },
]

[test.query]
cypher = """
MATCH (a:Person)-[:KNOWS]-(b:Person)
RETURN a.name, b.name
"""

[test.expected]
columns = ["a.name", "b.name"]
rows = [
    ["Alice", "Bob"],
    ["Bob", "Alice"],
]


[[test]]
name = "edge_with_variable"
description = "Bind relationship to variable"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS", properties = { since = 2020 } },
]

[test.query]
cypher = """
MATCH (a:Person)-[r:KNOWS]->(b:Person)
RETURN a.name, r.since, b.name
"""

[test.expected]
columns = ["a.name", "r.since", "b.name"]
rows = [
    ["Alice", 2020, "Bob"],
]


[[test]]
name = "any_edge_type"
