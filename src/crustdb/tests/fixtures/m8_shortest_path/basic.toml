# M8: Shortest Path Queries (openCypher 9)
#
# Tests for shortestPath() and allShortestPaths() functions.

[[test]]
name = "shortest_path_basic"
description = "Find shortest path between two nodes using shortestPath()"
[test.setup]
cypher = [
    # Create a simple linear path: A -> B
    "CREATE (a:Station {name: 'A'})-[:LINK]->(b:Station {name: 'B'})",
]
[test.query]
cypher = "MATCH p = shortestPath((src:Station {name: 'A'})-[:LINK*]->(dst:Station {name: 'B'})) RETURN length(p) AS result"
[test.expected]
row_count = 1
columns = ["result"]

[[test]]
name = "shortest_path_multi_hop"
description = "Find shortest path over multiple hops"
[test.setup]
cypher = [
    # Create a path: A -> B -> C (2 hops)
    "CREATE (a:Station {name: 'A'})-[:LINK]->(b:Station {name: 'B'})-[:LINK]->(c:Station {name: 'C'})",
]
[test.query]
cypher = "MATCH p = shortestPath((src:Station {name: 'A'})-[:LINK*]->(dst:Station {name: 'C'})) RETURN length(p) AS result"
[test.expected]
row_count = 1
columns = ["result"]

[[test]]
name = "shortest_path_no_path"
description = "No path exists between nodes"
[test.setup]
cypher = [
    "CREATE (a:Station {name: 'A'})",
    "CREATE (b:Station {name: 'B'})",
    # No edges between them
]
[test.query]
cypher = "MATCH p = shortestPath((src:Station {name: 'A'})-[:LINK*]->(dst:Station {name: 'B'})) RETURN length(p) AS result"
[test.expected]
row_count = 0
columns = ["result"]

[[test]]
name = "variable_length_one_or_more"
description = "Variable length *1.. matches one or more (openCypher 9 syntax)"
[test.setup]
cypher = [
    "CREATE (a:Station {name: 'A'})-[:LINK]->(b:Station {name: 'B'})",
]
[test.query]
cypher = "MATCH p = (src:Station)-[:LINK*1..]->(dst:Station) WHERE src.name = 'A' AND dst.name = 'B' RETURN length(p) AS result"
[test.expected]
row_count = 1
columns = ["result"]

[[test]]
name = "shortest_path_cycle"
description = "Find shortest path in a cycle, should take the short way not the long way"
[test.setup]
cypher = [
    # Create a cycle: A -> B -> C -> D -> A
    # Shortest path from A to C should be 2 edges (A->B->C), not 2 edges going backwards (A<-D<-C)
    "CREATE (a:Node {name: 'A'})-[:EDGE]->(b:Node {name: 'B'})-[:EDGE]->(c:Node {name: 'C'})-[:EDGE]->(d:Node {name: 'D'})-[:EDGE]->(a)",
]
[test.query]
cypher = "MATCH p = shortestPath((src:Node {name: 'A'})-[:EDGE*]->(dst:Node {name: 'C'})) RETURN length(p) AS len"
[test.expected]
row_count = 1
columns = ["len"]
# length(p) returns 2 because there are 2 edges: A->B->C
values = [[2]]

[[test]]
name = "shortest_path_comma_separated_match"
description = "openCypher 9: shortestPath as comma-separated pattern part with WHERE filter"
[test.setup]
cypher = [
    "CREATE (:User {name: 'Alice', objectid: 'U1'})-[:MemberOf]->(:Group {name: 'IT', objectid: 'G1'})-[:MemberOf]->(:Group {name: 'DA', objectid: 'S-1-5-21-512'})",
    "CREATE (:User {name: 'Bob', objectid: 'U2'})",
]
[test.query]
cypher = "MATCH (u:User), (da:Group), p = shortestPath((u)-[*1..5]->(da)) WHERE da.objectid ENDS WITH '-512' RETURN u.name AS name, length(p) AS hops"
[test.expected]
row_count = 1
columns = ["name", "hops"]
values = [["Alice", 2]]
