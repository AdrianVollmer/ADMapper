# M8: Aggregation
# Test cases for GROUP BY and aggregate functions

[[test]]
name = "count_all"
description = "Count all matched nodes"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie" } },
]

[test.query]
cypher = """
MATCH (n:Person)
RETURN count(n)
"""

[test.expected]
columns = ["count(n)"]
rows = [
    [3],
]


[[test]]
name = "count_star"
description = "Count rows with count(*)"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
]

[test.query]
cypher = """
MATCH (n:Person)
RETURN count(*)
"""

[test.expected]
columns = ["count(*)"]
rows = [
    [2],
]


[[test]]
name = "count_with_grouping"
description = "Count with implicit grouping"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS" },
    { from = "a", to = "c", type = "KNOWS" },
    { from = "b", to = "c", type = "KNOWS" },
]

[test.query]
cypher = """
MATCH (p:Person)-[:KNOWS]->(friend:Person)
RETURN p.name, count(friend) AS friends
"""

[test.expected]
columns = ["p.name", "friends"]
rows = [
    ["Alice", 2],
    ["Bob", 1],
]


