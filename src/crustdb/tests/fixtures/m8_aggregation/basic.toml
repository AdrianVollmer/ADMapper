[[test]]
name = "collect_with_grouping"
description = "Collect with grouping key"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", city = "NYC" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob", city = "LA" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie", city = "NYC" } },
]

[test.query]
cypher = """
MATCH (n:Person)
RETURN n.city, collect(n.name) AS residents
"""

[test.expected]
columns = ["n.city", "residents"]
rows = [
    ["NYC", ["Alice", "Charlie"]],
    ["LA", ["Bob"]],
]


[[test]]
name = "count_distinct"
