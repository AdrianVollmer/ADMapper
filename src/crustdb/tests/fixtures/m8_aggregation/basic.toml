    { id = "b", labels = ["Person"], properties = { name = "Bob", city = "LA" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie", city = "NYC" } },
]

[test.query]
cypher = """
MATCH (n:Person)
RETURN count(DISTINCT n.city)
"""

[test.expected]
columns = ["count(DISTINCT n.city)"]
rows = [
