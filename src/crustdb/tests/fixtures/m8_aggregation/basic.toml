]


[[test]]
name = "multiple_aggregations"
description = "Multiple aggregate functions in one query"

[test.setup]
nodes = [
    { id = "a", labels = ["Sale"], properties = { amount = 100, items = 2 } },
    { id = "b", labels = ["Sale"], properties = { amount = 200, items = 3 } },
    { id = "c", labels = ["Sale"], properties = { amount = 150, items = 1 } },
]

[test.query]
cypher = """
MATCH (s:Sale)
RETURN count(s), sum(s.amount), avg(s.items)
"""

[test.expected]
columns = ["count(s)", "sum(s.amount)", "avg(s.items)"]
rows = [
    [3, 450, 2.0],
]


[[test]]
