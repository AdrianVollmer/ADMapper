# M4: WHERE Clause Tests
#
# Tests for filtering with WHERE conditions.

[[test]]
name = "where_greater_than"
description = "Filter nodes where property is greater than value"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "bob", labels = ["Person"], properties = { name = "Bob", age = 25 } },
    { id = "charlie", labels = ["Person"], properties = { name = "Charlie", age = 35 } },
]
[test.query]
cypher = "MATCH (n:Person) WHERE n.age > 28 RETURN n"
[test.expected]
row_count = 2
columns = ["n"]

