# M4: WHERE Clause
# Test cases for filtering with WHERE conditions

[[test]]
name = "where_equality"
description = "Filter with equality comparison"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "b", labels = ["Person"], properties = { name = "Bob", age = 25 } },
]

[test.query]
cypher = """
MATCH (n:Person)
WHERE n.name = 'Alice'
RETURN n.name
"""

[test.expected]
columns = ["n.name"]
rows = [
    ["Alice"],
]


