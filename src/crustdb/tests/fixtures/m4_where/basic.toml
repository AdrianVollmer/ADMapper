[[test]]
name = "where_on_edge_property"
description = "Filter on edge properties"

[test.setup]
nodes = [
    { id = "a", labels = ["Person"], properties = { name = "Alice" } },
    { id = "b", labels = ["Person"], properties = { name = "Bob" } },
    { id = "c", labels = ["Person"], properties = { name = "Charlie" } },
]
edges = [
    { from = "a", to = "b", type = "KNOWS", properties = { since = 2020 } },
    { from = "a", to = "c", type = "KNOWS", properties = { since = 2015 } },
]

[test.query]
cypher = """
MATCH (a:Person)-[r:KNOWS]->(b:Person)
WHERE r.since > 2018
RETURN a.name, b.name
"""

[test.expected]
columns = ["a.name", "b.name"]
rows = [
    ["Alice", "Bob"],
]
