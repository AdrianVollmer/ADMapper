[[test]]
name = "delete_node_no_edges"
description = "Delete a node with no relationships"
[test.setup]
cypher = ["CREATE (n:Person {name: 'Alice'})"]
[test.query]
cypher = "MATCH (n:Person {name: 'Alice'}) DELETE n"
[test.expected]
row_count = 0
columns = []
[test.verify]
cypher = "MATCH (n:Person {name: 'Alice'}) RETURN n"
row_count = 0
columns = ["n"]

[[test]]
name = "detach_delete_node"
description = "Delete a node and its relationships with DETACH"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (n:Person {name: 'Alice'}) DETACH DELETE n"
[test.expected]
row_count = 0
columns = []
[test.verify]
cypher = "MATCH (n:Person {name: 'Alice'}) RETURN n"
row_count = 0
columns = ["n"]

[[test]]
name = "delete_relationship"
description = "Delete a relationship"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[r:KNOWS]->(b:Person) DELETE r"
[test.expected]
row_count = 0
columns = []
[test.verify]
cypher = "MATCH (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person) RETURN a, b"
row_count = 0
columns = ["a", "b"]

[[test]]
name = "set_multiple_properties"
description = "Set property on multiple matched nodes"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice', active: false})",
    "CREATE (b:Person {name: 'Bob', active: false})",
]
[test.query]
cypher = "MATCH (n:Person) SET n.active = true"
[test.expected]
row_count = 0
columns = []
[test.verify]
cypher = "MATCH (n:Person {active: true}) RETURN n.name"
row_count = 2
columns = ["n.name"]

[[test]]
name = "delete_with_return"
description = "Delete and return deleted node"
[test.setup]
cypher = ["CREATE (n:Person {name: 'Alice'})"]
[test.query]
cypher = "MATCH (n:Person {name: 'Alice'}) DELETE n RETURN n.name"
[test.expected]
row_count = 1
columns = ["n.name"]
