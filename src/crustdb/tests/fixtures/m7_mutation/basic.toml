# M7: Mutation Queries
# Test cases for SET and DELETE operations

[[test]]
name = "set_property"
description = "Set a property on a node"
[test.setup]
cypher = ["CREATE (n:Person {name: 'Alice', age: 30})"]
[test.query]
cypher = "MATCH (n:Person {name: 'Alice'}) SET n.age = 31"
[test.expected]
row_count = 0
columns = []
[test.verify]
cypher = "MATCH (n:Person {name: 'Alice'}) RETURN n.age"
row_count = 1
columns = ["n.age"]

[[test]]
name = "set_new_property"
description = "Add a new property to a node"
[test.setup]
cypher = ["CREATE (n:Person {name: 'Alice'})"]
[test.query]
cypher = "MATCH (n:Person {name: 'Alice'}) SET n.email = 'alice@example.com'"
[test.expected]
row_count = 0
columns = []
[test.verify]
cypher = "MATCH (n:Person {name: 'Alice'}) RETURN n.email"
row_count = 1
columns = ["n.email"]

[[test]]
