# M9: Function Tests
#
# Tests for built-in Cypher functions like type(), id(), labels().

[[test]]
name = "type_function"
description = "type(r) returns the relationship type"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (a:Person)-[r]->(b:Person) RETURN type(r)"
[test.expected]
row_count = 1
columns = ["type(r)"]

[[test]]
name = "type_function_multiple_types"
description = "type(r) returns correct type for each relationship"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})",
    "CREATE (a:Person {name: 'Alice'})-[:WORKS_WITH]->(c:Person {name: 'Charlie'})",
]
[test.query]
cypher = "MATCH (a:Person {name: 'Alice'})-[r]->(b:Person) RETURN b.name, type(r)"
[test.expected]
row_count = 2
columns = ["b.name", "type(r)"]

[[test]]
name = "type_function_in_where"
description = "type(r) can be used in WHERE clause"
[test.setup]
cypher = [
    "CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})",
    "CREATE (a:Person {name: 'Alice'})-[:WORKS_WITH]->(c:Person {name: 'Charlie'})",
]
[test.query]
cypher = "MATCH (a:Person)-[r]->(b:Person) WHERE type(r) = 'KNOWS' RETURN b.name"
[test.expected]
row_count = 1
columns = ["b.name"]

[[test]]
name = "id_function_node"
description = "id(n) returns the node ID"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})"]
[test.query]
cypher = "MATCH (a:Person) RETURN a.name, id(a)"
[test.expected]
row_count = 1
columns = ["a.name", "id(a)"]

[[test]]
name = "id_function_edge"
description = "id(r) returns the relationship ID"
[test.setup]
cypher = ["CREATE (a:Person {name: 'Alice'})-[:KNOWS]->(b:Person {name: 'Bob'})"]
[test.query]
cypher = "MATCH (a:Person)-[r:KNOWS]->(b:Person) RETURN id(r)"
[test.expected]
row_count = 1
columns = ["id(r)"]

[[test]]
