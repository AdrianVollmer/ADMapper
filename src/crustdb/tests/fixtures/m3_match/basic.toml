# M3: Basic MATCH Queries
#
# Tests for single-node pattern matching with labels and properties.

[[test]]
name = "match_all_nodes"
description = "Match all nodes in the database"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
    { id = "bob", labels = ["Person"], properties = { name = "Bob" } },
    { id = "matrix", labels = ["Movie"], properties = { title = "The Matrix" } },
]
[test.query]
cypher = "MATCH (n) RETURN n"
[test.expected]
row_count = 3
columns = ["n"]

[[test]]
name = "match_by_single_label"
description = "Match nodes with a specific label"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
    { id = "bob", labels = ["Person"], properties = { name = "Bob" } },
    { id = "matrix", labels = ["Movie"], properties = { title = "The Matrix" } },
]
[test.query]
cypher = "MATCH (n:Person) RETURN n"
[test.expected]
row_count = 2
columns = ["n"]

[[test]]
name = "match_by_multiple_labels"
description = "Match nodes that have all specified labels"
[test.setup]
nodes = [
    { id = "charlie", labels = ["Person", "Actor"], properties = { name = "Charlie" } },
    { id = "oliver", labels = ["Person", "Director"], properties = { name = "Oliver" } },
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
]
[test.query]
cypher = "MATCH (n:Person:Actor) RETURN n"
[test.expected]
row_count = 1
columns = ["n"]

[[test]]
name = "match_no_results"
description = "Match returns empty when no nodes match"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
]
[test.query]
cypher = "MATCH (n:Movie) RETURN n"
[test.expected]
row_count = 0
columns = ["n"]

[[test]]
name = "match_by_property"
description = "Match nodes by property value"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "bob", labels = ["Person"], properties = { name = "Bob", age = 25 } },
]
[test.query]
cypher = "MATCH (n:Person {name: 'Alice'}) RETURN n"
[test.expected]
row_count = 1
columns = ["n"]

[[test]]
name = "match_by_multiple_properties"
description = "Match nodes by multiple property values"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice", age = 30 } },
    { id = "alice2", labels = ["Person"], properties = { name = "Alice", age = 25 } },
    { id = "bob", labels = ["Person"], properties = { name = "Bob", age = 30 } },
]
[test.query]
cypher = "MATCH (n:Person {name: 'Alice', age: 30}) RETURN n"
[test.expected]
row_count = 1
columns = ["n"]

[[test]]
name = "return_single_property"
description = "Return a single property from matched nodes"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice", age = 30 } },
]
[test.query]
cypher = "MATCH (n:Person) RETURN n.name"
[test.expected]
row_count = 1
columns = ["n.name"]

[[test]]
name = "return_multiple_properties"
description = "Return multiple properties from matched nodes"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice", age = 30 } },
]
[test.query]
cypher = "MATCH (n:Person) RETURN n.name, n.age"
[test.expected]
row_count = 1
columns = ["n.name", "n.age"]

[[test]]
name = "return_missing_property"
description = "Return null for missing property"
[test.setup]
nodes = [
    { id = "alice", labels = ["Person"], properties = { name = "Alice" } },
]
[test.query]
cypher = "MATCH (n:Person) RETURN n.age"
[test.expected]
row_count = 1
columns = ["n.age"]

[[test]]
name = "match_empty_database"
description = "Match on empty database returns no rows"
[test.query]
cypher = "MATCH (n) RETURN n"
[test.expected]
row_count = 0
columns = ["n"]
